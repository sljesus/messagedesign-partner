<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Design - Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f0f;min-height:100vh;display:flex;align-items:center;justify-content:center}
.chat-widget{position:fixed;bottom:24px;right:24px;z-index:9999;font-size:14px}
.chat-btn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#25D366,#128C7E);border:none;cursor:pointer;box-shadow:0 8px 24px rgba(37,211,102,0.4);transition:transform 0.2s,box-shadow 0.2s}
.chat-btn:hover{transform:scale(1.1);box-shadow:0 12px 32px rgba(37,211,102,0.5)}
.chat-window{position:absolute;bottom:72px;right:0;width:380px;height:540px;background:#1a1a1a;border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,0.5);display:none;flex-direction:column;overflow:hidden;border:1px solid #333}
.chat-window.open{display:flex;animation:slideUp 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.chat-header{background:linear-gradient(135deg,#25D366,#128C7E);padding:16px 20px;display:flex;align-items:center;gap:12px}
.chat-avatar{width:44px;height:44px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px}
.chat-info h3{color:#fff;font-size:15px;font-weight:600}
.chat-info p{color:rgba(255,255,255,0.8);font-size:12px}
.chat-messages{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:#121212}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.msg{padding:12px 16px;border-radius:16px;max-width:85%;line-height:1.5;font-size:14px;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-bot{background:#2a2a2a;color:#e0e0e0;border-bottom-left-radius:4px;align-self:flex-start}
.msg-user{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.typing{background:#2a2a2a;padding:12px 20px;border-radius:16px;border-bottom-left-radius:4px;display:none;align-self:flex-start}
.typing.show{display:flex;gap:4px}
.typing span{width:8px;height:8px;background:#666;border-radius:50%;animation:bounce 1.4s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
.chat-input{display:flex;gap:8px;padding:12px 16px;background:#1a1a1a;border-top:1px solid #2a2a2a}
.chat-input input{flex:1;padding:12px 16px;background:#252525;border:1px solid #333;border-radius:24px;color:#fff;font-size:14px;outline:none;transition:border-color 0.2s}
.chat-input input:focus{border-color:#25D366}
.chat-input input::placeholder{color:#666}
.chat-input button{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#25D366,#128C7E);border:none;cursor:pointer;transition:transform 0.2s;display:flex;align-items:center;justify-content:center}
.chat-input button:hover{transform:scale(1.05)}
.chat-input button svg{width:20px;height:20px;fill:#fff}
@media(max-width:420px){
.chat-window{width:calc(100vw-32px);height:calc(100vh-100px);right:-16px}
}
</style>
</head>
<body>
<div class="chat-widget">
<div class="chat-window" id="chat">
<div class="chat-header">
<div class="chat-avatar">💬</div>
<div class="chat-info"><h3>Message Design</h3><p>Asistente virtual</p></div>
</div>
<div class="chat-messages" id="msgs"><div class="msg msg-bot">Hola! Soy el asistente de Message Design. En qué puedo ayudarte?</div><div class="typing" id="typing"><span></span><span></span><span></span></div></div>
<div class="chat-input"><input type="text" id="input" placeholder="Escribe tu mensaje..."><button id="send">➤</button></div>
</div>
<button class="chat-btn" id="toggle">💬</button>
</div>
<script>
const API_URL='https://messagedesign-partner.onrender.com';
const C=document.getElementById('chat'),T=document.getElementById('toggle'),I=document.getElementById('input'),S=document.getElementById('send'),M=document.getElementById('msgs'),Y=document.getElementById('typing');
let o=false;
T.onclick=()=>{C.classList.toggle('open');o=!o;if(o)I.focus()};
S.onclick=send;I.onkeydown=e=>{if(e.key==='Enter')send()};
function send(){const m=I.value.trim();if(!m)return;I.value='';addMsg(m,'user');Y.classList.add('show');fetch(API_URL+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mensaje:m,session_id:'web'})}).then(r=>r.json()).then(d=>{Y.classList.remove('show');addMsg(d.respuesta,'bot')}).catch(()=>{Y.classList.remove('show');addMsg('Error de conexión. Intenta de nuevo.','bot')})}
function addMsg(t,y){const d=document.createElement('div');d.className=`msg msg-${y}`;d.textContent=t;M.insertBefore(d,Y);M.scrollTop=M.scrollHeight}
</script>
</body>
</html>
